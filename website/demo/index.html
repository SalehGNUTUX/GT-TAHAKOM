<title>TAHAKOM — تَحَكُّمْ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 90% at 50% 18%, #f3f4f6 0%, #e2e3e7 55%, #d3d4d9 100%);
    font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { height: 100%; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* screen entrance — transform only so content is never hidden if anims pause */
  .om-screen { animation: omScreen .34s cubic-bezier(.32,.72,0,1); }
  @keyframes omScreen { from { transform: translateY(10px); } to { transform: none; } }

  .om-fade-up { animation: omFadeUp .42s cubic-bezier(.32,.72,0,1) both; }
  @keyframes omFadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  /* onboarding rings (breathing) */
  .om-ring { animation: omRing 3.4s ease-in-out infinite; }
  @keyframes omRing { 0%,100% { opacity: .35; transform: scale(.98); } 50% { opacity: .85; transform: scale(1.02); } }

  /* pulse (scan radar) */
  .om-pulse { animation: omPulse 2.7s ease-out infinite; }
  @keyframes omPulse { 0% { transform: scale(.5); opacity: .7; } 80%,100% { transform: scale(1.7); opacity: 0; } }

  /* floating orbs bob */
  .om-float { animation: omFloat 3.6s ease-in-out infinite; }
  @keyframes omFloat { 0%,100% { transform: translateY(-5px); } 50% { transform: translateY(5px); } }

  /* dashed connecting lines */
  .om-dash { stroke-dashoffset: 0; animation: omDash 1.1s linear infinite; }
  @keyframes omDash { to { stroke-dashoffset: -16; } }

  /* active transport beam (one-shot via key remount) */
  .om-beam { animation: omBeam .85s ease-out; opacity: 0; }
  @keyframes omBeam { 0% { transform: scale(.7); opacity: .9; } 100% { transform: scale(1.7); opacity: 0; } }

  /* touchpad ripple (one-shot) */
  .om-ripple { animation: omRipple .55s ease-out forwards; }
  @keyframes omRipple { 0% { transform: scale(0); opacity: .5; } 100% { transform: scale(9); opacity: 0; } }
</style>
</head>
