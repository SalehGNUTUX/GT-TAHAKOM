name: Release

# عند دفع وسم v* يبني APK release ويُنشئ إصداراً على GitHub ويُرفق الـ APK.
# يوقّع تلقائياً إن أُضيفت أسرار keystore (انظر docs/CI.md)، وإلا يبني بلا توقيع.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # يعيد بناء keystore.properties + ملف المفتاح من الأسرار إن وُجدت (التوقيع اختياري).
      - name: Prepare signing (optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            {
              echo "storeFile=release.keystore"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > keystore.properties
            echo "Signing enabled."
          else
            echo "No keystore secret — building unsigned release."
          fi

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          # الوسوم ذات اللاحقة (مثل v1.0.0-rc1) تُعدّ prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
