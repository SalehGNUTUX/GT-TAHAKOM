name: Build & Lint

# يبني APK تجريبياً ويُشغّل lint عند كل دفع/طلب دمج على main — يثبت أن المشروع
# يُبنى من المصدر نظيفاً (شرط لاحق لـ F-Droid).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'index.html'
      - 'website/**'
      - '**/*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK + lint
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug lintDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gt-tahakom-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
